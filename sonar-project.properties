sonar.projectKey=MystenLabs_hashi-ts-sdk
sonar.organization=mystenlabs

sonar.projectName=hashi-ts-sdk

sonar.sources=src
sonar.tests=test

# hashi/ is a git submodule (MystenLabs/hashi);
# src/contracts/** is auto-generated by @mysten/codegen; src/index.ts is a barrel.
sonar.exclusions=hashi/**,src/contracts/**,src/index.ts
sonar.coverage.exclusions=hashi/**,src/contracts/**,src/index.ts
sonar.cpd.exclusions=hashi/**,src/contracts/**,test/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
