sonar.exclusions=hashi/**,packages/hashi/src/contracts/**,packages/hashi/src/index.ts
sonar.coverage.exclusions=hashi/**,packages/hashi/src/contracts/**,packages/hashi/src/index.ts
sonar.cpd.exclusions=hashi/**,packages/hashi/src/contracts/**,packages/hashi/test/**

sonar.javascript.lcov.reportPaths=packages/hashi/coverage/lcov.info

sonar.sourceEncoding=UTF-8
