name: Integration Tests (manual)

# Not run on push/PR: the integration suite hits live devnet + signet and
# would burn the signet faucet's rate limit on every commit. Trigger from
# the Actions tab when you need an end-to-end verification.
on:
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test:integration
        env:
          HASHI_E2E_SUI_PRIVATE_KEY: ${{ secrets.HASHI_E2E_SUI_PRIVATE_KEY }}
